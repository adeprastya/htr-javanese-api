services:
  - type: web
    name: htr-javanese-api
    runtime: python
    buildCommand: pip install -r requirements_1.txt && pip install -r requirements_2.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: APP_MODEL_PATH
        value: model/5cnn-2bilstm.pth
